<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Treino CEBRASPE</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KSV6X8DX2L"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KSV6X8DX2L');
</script>
<body>

<div class="menu">
  <a href="exercicio.html">
  <button>Ir para Razonetes</button>
</a>
</div>

<div class="container">

  <!-- QUIZ -->
  <div class="card">
    <h2>Classifique a conta:</h2>
    <p id="question" class="question"></p>

    <button onclick="toggleExample()">Ver exemplo</button>
    <div id="example" class="example" style="display:none;"></div>

    <h3>Tipo</h3>
    <div id="tipos"></div>

    <h3>Natureza</h3>
    <div id="naturezas"></div>

<div class="actions">
  <button id="btn-verificar" onclick="checkAnswer()">Verificar</button>
  <button id="btn-proxima-quiz" onclick="nextQuestion()">Próxima</button>
</div>

    <div id="result"></div>
  </div>

<div class="card stats">

  <button class="btn-clear" onclick="clearProgress()">🗑</button>

  <h2>Desempenho</h2>

  <p id="statTotal"></p>
  <p id="statAcertos" class="green"></p>
  <p id="statErros" class="red"></p>
  <p id="statPendentes" class="yellow"></p>

  <div class="progress-bar">
    <div id="progress"></div>
  </div>

  <button onclick="reviewErrors()">Revisar erros</button>
  <button onclick="resetAll()">Resetar</button>
</div>

</body>
</html>
