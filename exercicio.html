<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Prática de Razonetes</title>
  <!-- Importe seu style.css aqui -->
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="menu">
    <a href="index.html"><button>Voltar ao Início</button></a>
</div>

<div class="conteudo">
    <div class="container" style="max-width: 1100px;">
        
        <!-- BOX DE DADOS (ESQUERDA) -->
        <div class="dados">
            <h3 id="titulo-exercicio">📝 Carregando Exercício...</h3>
            <div id="lista-dados">
                <!-- Os <p> serão inseridos aqui pelo JS -->
            </div>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <p><b>Objetivo:</b> Monte os razonetes e descubra o valor do PL.</p>
            <button id="btn-proxima" onclick="proximoExercicio()" style="display:none; margin-top:10px;">Próximo Exercício</button>
        </div>

        <!-- BOX DE LANÇAMENTOS (DIREITA) -->
        <div class="card">
            <div class="grid-razonetes">
                <div class="razonete">
                    <h3>Ativo</h3>
                    <table id="ativo">
                        <tr><td><input type="number" class="ativo-input"></td><td><input type="number" class="ativo-input"></td></tr>
                        <tr><td><input type="number" class="ativo-input"></td><td><input type="number" class="ativo-input"></td></tr>
                        <tr><td><input type="number" class="ativo-input"></td><td><input type="number" class="ativo-input"></td></tr>
                        <tr><td><input type="number" class="ativo-input"></td><td><input type="number" class="ativo-input"></td></tr>
                    </table>
                </div>

                <div class="razonete">
                    <h3>Passivo</h3>
                    <table id="passivo">
                        <tr><td><input type="number" class="passivo-input"></td><td><input type="number" class="passivo-input"></td></tr>
                        <tr><td><input type="number" class="passivo-input"></td><td><input type="number" class="passivo-input"></td></tr>
                        <tr><td><input type="number" class="passivo-input"></td><td><input type="number" class="passivo-input"></td></tr>
                        <tr><td><input type="number" class="passivo-input"></td><td><input type="number" class="passivo-input"></td></tr>
                    </table>
                </div>
            </div>

            <div class="pl-input">
                <h3>Patrimônio Líquido</h3>
                <input type="number" id="valorPL" placeholder="Digite o valor do PL">
            </div>

            <button id="btn-verificar" onclick="verificar()">Verificar Balanço</button>
            <h2 id="resultado" style="font-size: 16px; margin-top: 15px; white-space: pre-line;"></h2>
        </div>
    </div>
</div>

</body>
</html>
